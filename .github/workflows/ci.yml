name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only reads the repo and runs checks; no token writes.
permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (lint · type-check · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      # `check` chains lint + oxlint + prettier + `type-check` (vue-tsc -b).
      # Build mode is what catches the TS errors that otherwise only surface
      # in the prod Docker build.
      - name: Lint, format & type-check
        run: npm run check

      - name: Unit tests
        run: npm run test:run

      - name: Production build
        run: npm run build

  backend:
    name: Backend (compile · detekt · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      # `build` runs compileKotlin, detekt and the full test suite.
      # Testcontainers uses the Docker daemon preinstalled on ubuntu-latest.
      - name: Build & test
        run: ./gradlew build --no-daemon
