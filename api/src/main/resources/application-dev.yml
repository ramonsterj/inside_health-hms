# Development profile - includes test seed data
# Run with: ./gradlew bootRun --args='--spring.profiles.active=dev'
# Or set environment variable: SPRING_PROFILES_ACTIVE=dev

spring:
  flyway:
    locations: classpath:db/migration,classpath:db/seed
    ignore-migration-patterns: "*:missing"

app:
  file-storage:
    base-path: ${FILE_STORAGE_PATH:./data/files}
  cors:
    additional-origins:
      - "http://localhost:*"
      - "http://127.0.0.1:*"
  csp:
    connect-src-extra:
      - "http://localhost:*"
      - "http://127.0.0.1:*"
